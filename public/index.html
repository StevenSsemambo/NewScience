<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="description" content="Uganda's AI-Powered UCE & UACE Exam Prep Platform" />

    <!-- PWA meta tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MathQuest" />

    <!-- Apple touch icons (for iOS home screen) -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%PUBLIC_URL%/icons/icon-512.png" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" href="%PUBLIC_URL%/icons/icon-192.png" />

    <title>MathQuest UG</title>

    <style>
      body { margin: 0; background: #080810; }
      #splash {
        position: fixed; inset: 0; background: #080810;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 9999;
        font-family: sans-serif;
        transition: opacity 0.4s ease;
      }
      #splash .sp-logo {
        font-size: 48px; margin-bottom: 16px;
        animation: pulse 1.5s ease infinite;
      }
      #splash .sp-name {
        font-size: 28px; font-weight: 800; color: #FFD700;
        letter-spacing: -1px;
      }
      #splash .sp-sub { font-size: 13px; color: #666; margin-top: 6px; }
      #splash .sp-bar {
        width: 120px; height: 3px; background: rgba(255,215,0,0.15);
        border-radius: 2px; margin-top: 32px; overflow: hidden;
      }
      #splash .sp-fill {
        height: 100%; background: #FFD700; border-radius: 2px;
        animation: load 1.5s ease forwards;
      }
      @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
      @keyframes load { from{width:0} to{width:100%} }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="sp-logo">📐</div>
      <div class="sp-name">MathQuest UG</div>
      <div class="sp-sub">AI Exam Prep · UCE & UACE</div>
      <div class="sp-bar"><div class="sp-fill"></div></div>
    </div>
    <div id="root"></div>

    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW error:', err));
        });
      }
      // Hide splash after app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 400); }
        }, 1500);
      });
    </script>
  </body>
</html>
